<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی کارگێڕی ئۆتۆمبێل</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root {
            --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --warning: #f1c40f; --dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .container {
            max-width: 550px; width: 100%; background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-top: 10px;
        }

        h2 { text-align: center; color: var(--dark); margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #666; }

        input, select {
            padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px;
            width: 100%; box-sizing: border-box; outline: none; transition: 0.3s;
        }

        .button-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;
        }

        button {
            padding: 12px; border: none; border-radius: 10px; cursor: pointer;
            font-weight: bold; color: white; transition: 0.3s;
        }

        .btn-list { background-color: var(--dark); width: 100%; max-width: 550px; margin-bottom: 15px; font-size: 16px; }
        .btn-save { background-color: var(--success); grid-column: span 2; }
        .btn-search { background-color: var(--primary); }
        .btn-clear { background-color: #95a5a6; }
        .btn-update { background-color: var(--warning); color: #333; display: none; }
        .btn-delete { background-color: var(--danger); display: none; }

        /* Modal Styles */
        #listModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; width: 95%; max-width: 600px; max-height: 85vh;
            border-radius: 15px; padding: 20px; overflow-y: auto; position: relative;
        }
        .close-modal { position: absolute; left: 15px; top: 15px; cursor: pointer; font-size: 24px; color: var(--danger); }
        
        .modal-stats-bar {
            background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 15px;
            display: flex; justify-content: space-around; border: 1px solid #ddd;
        }
        .stat-item { text-align: center; font-size: 14px; }
        .stat-item b { display: block; font-size: 18px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; font-size: 14px; }
        th { background-color: #f4f4f4; position: sticky; top: 0; }
        tr:hover { background: #f1f1f1; cursor: pointer; }

        #searchResults { margin-top: 20px; border-top: 2px solid #eee; display: none; }
        .search-item {
            background: #f9f9f9; padding: 10px; margin-top: 10px; border-radius: 8px;
            cursor: pointer; border: 1px solid #ddd; display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

<button class="btn-list" onclick="openAllCarsModal()">📋 بینینی لیستی ئۆتۆمبێلەکان و ئامار</button>

<div class="container">
    <h2>سەرپەرشتی ئۆتۆمبێل</h2>
    <input type="hidden" id="docId">

    <div class="form-group">
        <label>ژمارەی ئۆتۆمبێل:</label>
        <input type="text" id="carNumber" placeholder="ژمارەکە لێرە بنووسە..." autofocus>
    </div>

    <div class="form-group">
        <label>هێڵ:</label>
        <select id="carLine">
            <option value="" disabled selected>هەڵبژێرە</option>
            <option value="هەولێر">هەولێر</option>
            <option value="کەرکوک">کەرکوک</option>
            <option value="ڕانیە">ڕانیە</option>
            <option value="قەڵادزێ">قەڵادزێ</option>
            <option value="بغداد">بغداد</option>
            <option value="چەمچەماڵ">چەمچەماڵ</option>
            <option value="دووز">دووز</option>
            <option value="کۆیە">کۆیە</option>
        </select>
    </div>

    <div class="form-group">
        <label>نرخ:</label>
        <select id="carPrice">
            <option value="" disabled selected>نرخ دیاری بکە</option>
            <option value="1000">1000</option>
            <option value="2000">2000</option>
            <option value="3000">3000</option>
            <option value="4000">4000</option>
            <option value="5000">5000</option>
            <option value="6000">6000</option>
            <option value="6500">6500</option>
            <option value="10000">10000</option>
            <option value="15000">15000</option>
        </select>
    </div>

    <div class="form-group">
        <label>جۆر:</label>
        <select id="carType">
            <option value="" disabled selected>جۆرەکە دیاری بکە</option>
            <option value="تەکسی">تەکسی</option>
            <option value="پاس">پاس</option>
        </select>
    </div>

    <div class="button-grid">
        <button id="saveBtn" class="btn-save" onclick="saveData()">💾 خەزنکردن</button>
        <button id="updateBtn" class="btn-update" onclick="updateData()">🔄 نوێکردنەوە</button>
        <button id="deleteBtn" class="btn-delete" onclick="deleteData()">🗑️ سڕینەوە</button>
        <button class="btn-search" onclick="searchCar()">🔍 گەڕان</button>
        <button class="btn-clear" onclick="clearInputs()">✨ پاککردنەوە</button>
    </div>

    <div id="searchResults">
        <div id="resultsList"></div>
    </div>
</div>

<div id="listModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3>📊 ئامار و لیستی ئۆتۆمبێلەکان</h3>
        
        <div class="modal-stats-bar">
            <div class="stat-item">کۆی گشتی <b id="mTotal" style="color:var(--primary)">0</b></div>
            <div class="stat-item">تەکسی <b id="mTaxi" style="color:var(--success)">0</b></div>
            <div class="stat-item">پاس <b id="mBus" style="color:var(--warning)">0</b></div>
        </div>

        <div class="form-group">
            <label>فلتەر بەپێی هێڵ:</label>
            <select id="filterLine" onchange="filterTable()">
                <option value="all">هەموو هێڵەکان</option>
                <option value="هەولێر">هەولێر</option>
                <option value="کەرکوک">کەرکوک</option>
                <option value="ڕانیە">ڕانیە</option>
                <option value="قەڵادزێ">قەڵادزێ</option>
                <option value="بغداد">بغداد</option>
                <option value="چەمچەماڵ">چەمچەماڵ</option>
                <option value="دووز">دووز</option>
                <option value="کۆیە">کۆیە</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ژمارە</th>
                    <th>هێڵ</th>
                    <th>جۆر</th>
                    <th>نرخ</th>
                </tr>
            </thead>
            <tbody id="allCarsTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCuUstd-6d0E-EbmQipv2mWk-bA55ajpQ0",
        authDomain: "car-system-4594d.firebaseapp.com",
        projectId: "car-system-4594d",
        storageBucket: "car-system-4594d.firebasestorage.app",
        messagingSenderId: "719030469585",
        appId: "1:719030469585:web:7a23645b9e684b727dd6f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allCarsData = [];

    async function saveData() {
        const num = document.getElementById('carNumber').value.trim();
        const line = document.getElementById('carLine').value;
        const price = document.getElementById('carPrice').value;
        const type = document.getElementById('carType').value;

        if(!num || !line || !price || !type) return alert("خانەکان پڕ بکەرەوە");

        const dup = await db.collection("Cars").where("number","==",num).where("line","==",line).get();
        if(!dup.empty) return alert("ئەم ژمارەیە پێشتر تۆمار کراوە!");

        await db.collection("Cars").add({ 
            number: num, line: line, price: price, type: type, 
            time: firebase.firestore.FieldValue.serverTimestamp() 
        });
        alert("خەزن کرا"); clearInputs();
    }

    async function openAllCarsModal() {
        document.getElementById('listModal').style.display = 'flex';
        const snap = await db.collection("Cars").orderBy("time", "desc").get();
        allCarsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderTable(allCarsData);
    }

    function renderTable(data) {
        const tbody = document.getElementById('allCarsTableBody');
        tbody.innerHTML = data.map(car => `
            <tr onclick="selectFromTable('${car.id}', '${car.number}', '${car.line}', '${car.price}', '${car.type}')">
                <td>${car.number}</td>
                <td>${car.line}</td>
                <td>${car.type}</td>
                <td>${car.price}</td>
            </tr>`).join('');

        document.getElementById('mTotal').innerText = data.length;
        document.getElementById('mTaxi').innerText = data.filter(c => c.type === "تەکسی").length;
        document.getElementById('mBus').innerText = data.filter(c => c.type === "پاس").length;
    }

    function filterTable() {
        const line = document.getElementById('filterLine').value;
        const filtered = line === "all" ? allCarsData : allCarsData.filter(c => c.line === line);
        renderTable(filtered);
    }

    function selectFromTable(id, num, line, price, type) {
        selectForEdit(id, num, line, price, type);
        closeModal();
    }

    function closeModal() { document.getElementById('listModal').style.display = 'none'; }

    async function searchCar() {
        const num = document.getElementById('carNumber').value.trim();
        if(!num) return alert("بۆ گەڕان ژمارە بنووسە");
        const snap = await db.collection("Cars").where("number", "==", num).get();
        const listDiv = document.getElementById('resultsList');
        const resDiv = document.getElementById('searchResults');
        listDiv.innerHTML = "";
        if (snap.empty) { resDiv.style.display='none'; alert("نەدۆزرایەوە"); }
        else {
            resDiv.style.display='block';
            snap.forEach(doc => {
                const d = doc.data();
                listDiv.innerHTML += `<div class="search-item" onclick="selectForEdit('${doc.id}','${d.number}','${d.line}','${d.price}','${d.type}')">
                    <span>${d.line}</span><span>${d.price} دینار</span></div>`;
            });
        }
    }

    function selectForEdit(id, num, line, price, type) {
        document.getElementById('docId').value = id;
        document.getElementById('carNumber').value = num;
        document.getElementById('carLine').value = line;
        document.getElementById('carPrice').value = price;
        document.getElementById('carType').value = type;
        document.getElementById('updateBtn').style.display='block';
        document.getElementById('deleteBtn').style.display='block';
        document.getElementById('saveBtn').style.display='none';
        document.getElementById('searchResults').style.display='none';
    }

    async function updateData() {
        const id = document.getElementById('docId').value;
        await db.collection("Cars").doc(id).update({
            number: document.getElementById('carNumber').value,
            line: document.getElementById('carLine').value,
            price: document.getElementById('carPrice').value,
            type: document.getElementById('carType').value
        });
        alert("نوێکرایەوە"); clearInputs();
    }

    async function deleteData() {
        const id = document.getElementById('docId').value;
        if(confirm("دڵنیای؟")) { await db.collection("Cars").doc(id).delete(); alert("سڕایەوە"); clearInputs(); }
    }

    function clearInputs() {
        document.getElementById('docId').value = "";
        document.getElementById('carNumber').value = "";
        document.getElementById('carLine').selectedIndex = 0;
        document.getElementById('carPrice').selectedIndex = 0;
        document.getElementById('carType').selectedIndex = 0;
        document.getElementById('updateBtn').style.display='none';
        document.getElementById('deleteBtn').style.display='none';
        document.getElementById('saveBtn').style.display='block';
        document.getElementById('carNumber').focus();
    }
</script>
</body>
</html>
